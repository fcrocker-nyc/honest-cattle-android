name: honest_cattle
description: "HonestCattle - Complete cattle management app for ranchers"
publish_to: 'none'
version: 2.3.0+9

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database (Offline-first)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.68.0

  # Camera & OCR
  camera: ^0.11.0+1
  google_mlkit_text_recognition: ^0.12.0

  # Notifications
  flutter_local_notifications: ^17.2.1+2

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # HTTP
  http: ^1.2.1
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1

  # BLE (for RFID/Smart Tags)
  flutter_blue_plus: ^1.32.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/appicon.png
    - assets/hc_logo.png
    - assets/hero_banner.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appicon.png"
  remove_alpha_ios: true
